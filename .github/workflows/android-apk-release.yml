name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
      - build-apk-release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare optional release signing keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$RELEASE_STORE_PASSWORD" ] && [ -n "$RELEASE_KEY_PASSWORD" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"
          fi

      - name: Build debug and release APKs
        env:
          KEYSTORE_PATH: ${{ format('{0}/release-keystore.jks', runner.temp) }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -x "./gradlew" ]; then
            ./gradlew assembleDebug assembleRelease
          else
            gradle assembleDebug assembleRelease
          fi

      - name: Resolve release APK path
        id: apk_paths
        run: |
          set -euo pipefail
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$RELEASE_APK" ]; then
            RELEASE_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          echo "debug_apk=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          echo "release_apk=$RELEASE_APK" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.apk_paths.outputs.debug_apk }}

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.apk_paths.outputs.release_apk }}

      - name: Create GitHub release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          name: CleanShare APK Build ${{ github.run_number }}
          generate_release_notes: true
          files: |
            ${{ steps.apk_paths.outputs.debug_apk }}
            ${{ steps.apk_paths.outputs.release_apk }}
          body: |
            Automated APK build for `${{ github.ref_name }}`.

            ### Installation
            1. Download `app-release.apk` (or `app-release-unsigned.apk` / `app-debug.apk`).
            2. Transfer the APK to your Android device.
            3. Enable "Install unknown apps" for your installer app.
            4. Open the APK file and install CleanShare.
